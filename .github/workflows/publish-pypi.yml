name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine pytest tomli

      - name: Check release tag matches package version
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          import tomli

          version = tomli.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          expected_tag = f"v{version}"

          if event_name == "release" and ref_name != expected_tag:
              raise SystemExit(f"release tag {ref_name!r} must match pyproject version tag {expected_tag!r}")
          print(f"package version: {version}")
          PY

      - name: Run tests
        run: python -m pytest -q

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bensz-auto-contribution/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
